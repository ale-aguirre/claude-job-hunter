<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="60" fill="#0e0818"/>
  <circle cx="60" cy="60" r="58" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>

  <!-- Neck -->
  <rect x="51" y="89" width="18" height="13" rx="3" fill="#e8c49a"/>

  <!-- White shirt / uniform -->
  <path d="M36 102 Q60 97 84 102 L90 120 H30 Z" fill="#f0f0f0"/>
  <path d="M60 97 L56 120" stroke="#ddd" stroke-width="1" fill="none"/>
  <path d="M60 97 L64 120" stroke="#ddd" stroke-width="1" fill="none"/>

  <!-- Face -->
  <ellipse cx="60" cy="73" rx="21" ry="22" fill="#e8c49a"/>

  <!-- Ear left -->
  <ellipse cx="38" cy="74" rx="4" ry="5.5" fill="#e8c49a"/>
  <!-- Ear right -->
  <ellipse cx="82" cy="74" rx="4" ry="5.5" fill="#e8c49a"/>

  <!-- Hair — Mob: dark bowl cut, straight/plain -->
  <ellipse cx="60" cy="55" rx="23" ry="19" fill="#1c1c1c"/>
  <!-- Bowl cut flat bottom line -->
  <rect x="37" y="62" width="46" height="6" rx="0" fill="#1c1c1c"/>
  <!-- Flat fringe across forehead -->
  <path d="M37 66 Q60 70 83 66" fill="#1c1c1c"/>
  <!-- Hair sides hang down -->
  <path d="M37 64 Q35 72 37 80" stroke="#1c1c1c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M83 64 Q85 72 83 80" stroke="#1c1c1c" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows — flat, blank expression -->
  <line x1="45" y1="68" x2="55" y2="68" stroke="#3a3a3a" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="68" x2="75" y2="68" stroke="#3a3a3a" stroke-width="2" stroke-linecap="round"/>

  <!-- Eyes — Mob's signature blank/half-lidded look -->
  <ellipse cx="50" cy="74" rx="5" ry="4" fill="white"/>
  <ellipse cx="70" cy="74" rx="5" ry="4" fill="white"/>
  <!-- Half-lid (top) -->
  <path d="M45 71 Q50 70 55 71" fill="#1c1c1c"/>
  <path d="M65 71 Q70 70 75 71" fill="#1c1c1c"/>
  <!-- Pupils — small, centered -->
  <circle cx="50" cy="74" r="2.8" fill="#2a1a6e"/>
  <circle cx="70" cy="74" r="2.8" fill="#2a1a6e"/>
  <circle cx="50" cy="74" r="1.5" fill="#111"/>
  <circle cx="70" cy="74" r="1.5" fill="#111"/>
  <!-- Eye shine (tiny) -->
  <circle cx="51.5" cy="73" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="71.5" cy="73" r="0.8" fill="white" opacity="0.7"/>

  <!-- Nose — minimal -->
  <path d="M59 79 Q61 81 63 79" stroke="#c9a07a" stroke-width="1" fill="none"/>

  <!-- Mouth — neutral/flat (Mob's default expression) -->
  <line x1="53" y1="86" x2="67" y2="86" stroke="#b07060" stroke-width="1.8" stroke-linecap="round"/>

  <!-- % psychic indicator (Mob Psycho signature) — subtle -->
  <text x="60" y="18" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#7c3aed" text-anchor="middle" opacity="0.7">???%</text>
</svg>
