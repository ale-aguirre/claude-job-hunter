  <!-- Lab coat collar -->
  <path d="M38 102 Q60 96 82 102 L88 120 H32 Z" fill="#e8e8e8"/>
  <path d="M60 96 L54 120" stroke="#ccc" stroke-width="1" fill="none"/>
  <path d="M60 96 L66 120" stroke="#ccc" stroke-width="1" fill="none"/>

  <!-- Face -->
  <ellipse cx="60" cy="72" rx="22" ry="24" fill="#e8c49a"/>

  <!-- Ear left -->
  <ellipse cx="37" cy="73" rx="4.5" ry="6" fill="#e8c49a"/>
  <!-- Ear right -->
  <ellipse cx="83" cy="73" rx="4.5" ry="6" fill="#e8c49a"/>

  <!-- Hair — Dr. Stone: dark spiky hair with white streak -->
  <!-- Main dark hair mass -->
  <ellipse cx="60" cy="52" rx="24" ry="20" fill="#1a1a1a"/>
  <!-- Spiky hair top -->
  <path d="M40 50 Q38 30 48 22 Q52 38 50 46" fill="#1a1a1a"/>
  <path d="M50 44 Q50 24 60 16 Q64 32 62 44" fill="#1a1a1a"/>
