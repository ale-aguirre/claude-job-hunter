  <path d="M68 48 Q76 28 84 34 Q78 44 74 50" fill="#1a1a1a"/>
  <!-- White streak (signature Senku feature) -->
  <path d="M56 20 Q59 38 60 46" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Hair sides -->
  <path d="M36 56 Q34 66 36 74" stroke="#1a1a1a" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M84 56 Q86 66 84 74" stroke="#1a1a1a" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows — sharp/determined -->
  <path d="M44 66 Q50 62 56 65" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M64 65 Q70 62 76 66" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes — sharp, confident -->
  <ellipse cx="50" cy="70" rx="5.5" ry="4.5" fill="white"/>
  <ellipse cx="70" cy="70" rx="5.5" ry="4.5" fill="white"/>
  <circle cx="51" cy="70" r="3" fill="#1a6e4a"/>
  <circle cx="71" cy="70" r="3" fill="#1a6e4a"/>
  <circle cx="52" cy="69" r="1.2" fill="black"/>
  <circle cx="72" cy="69" r="1.2" fill="black"/>
  <!-- Eye shine -->
  <circle cx="53" cy="68" r="1" fill="white" opacity="0.8"/>
  <circle cx="73" cy="68" r="1" fill="white" opacity="0.8"/>

  <!-- Nose -->
  <path d="M59 76 Q61 78 63 76" stroke="#c9a07a" stroke-width="1.2" fill="none"/>

  <!-- Smirk — signature Senku expression -->
  <path d="M50 84 Q60 90 70 84" stroke="#c07060" stroke-width="2" fill="none" stroke-linecap="round"/>

